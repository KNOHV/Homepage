<form action="widerruf-verarbeiten.php" method="POST" class="widerruf-form">
  <h2>Widerruf erklären</h2>
  <p>Bitte füllen Sie das Formular aus, um Ihren Widerruf einzureichen.</p>

  <div class="form-group">
    <label for="order-id">Bestellnummer*</label>
    <input type="text" id="order-id" name="order_id" required placeholder="z.B. #12345">
  </div>

  <div class="form-group">
    <label for="order-date">Bestellt am / Erhalten am*</label>
    <input type="date" id="order-date" name="order_date" required>
  </div>

  <div class="form-group">
    <label for="full-name">Name des Verbrauchers*</label>
    <input type="text" id="full-name" name="full_name" required placeholder="Vor- und Nachname">
  </div>

  <div class="form-group">
    <label for="email">E-Mail-Adresse*</label>
    <input type="email" id="email" name="email" required placeholder="deine E-Mail adresse ">
  </div>

  <div class="form-group">
    <label for="address">Anschrift</label>
    <textarea id="address" name="address" rows="3" placeholder="Straße, Hausnummer, PLZ, Ort"></textarea>
  </div>

  <div class="form-group">
    <label for="message">Welche Artikel möchten Sie widerrufen? (Optional)</label>
    <textarea id="message" name="message" rows="3" placeholder="Falls nur Teile der Bestellung widerrufen werden."></textarea>
  </div>

  <button type="submit" class="submit-button">Widerruf jetzt absenden</button>
</form>
